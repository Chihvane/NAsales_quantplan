apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-os
spec:
  replicas: 3
  selector:
    matchLabels:
      app: decision-os
  template:
    metadata:
      labels:
        app: decision-os
    spec:
      containers:
        - name: decision-os
          image: decision-os:v3.0
          ports:
            - containerPort: 8000
