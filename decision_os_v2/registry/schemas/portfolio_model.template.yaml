portfolio_model_schema:
  model_id: MOD-PORTFOLIO-ALLOC
  schema_version: 2.0
  ref_key: model.portfolio_allocator
  type: constrained_optimization
  objective: maximize_expected_return
  constraints:
    - total_capital <= capital_pool.free_capital
    - expected_loss <= risk_budget.max_loss_probability
    - channel_dependency <= risk_budget.max_channel_dependency
